<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎯 Repaso Inteligente</title>
<style>
:root{--bg:#0a0a1a;--panel:#17152e;--panel2:#221f47;--ink:#f4f2fc;--muted:#aaa2c9;--accent:#9d8fff;--gold:#ffcc4d;--green:#2dd4a8;--red:#ff5d8f;
--MED:#9d8fff;--PED:#2dd4a8;--CIR:#ff5d8f;--GIN:#ff9459;--SP:#ffcc4d;--CB:#38bdf8;}
*{box-sizing:border-box}body{margin:0;font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--ink);padding:18px}
.wrap{max-width:760px;margin:0 auto}
h1{font-size:1.4rem;margin:0 0 4px}
.sub{color:var(--muted);font-size:.85rem;margin-bottom:14px}
.top{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;background:var(--panel);border:1px solid #2a3550;border-radius:12px;padding:12px 16px;margin-bottom:16px}
.card{background:var(--panel);border:1px solid #2a3550;border-radius:14px;padding:22px;min-height:220px;display:flex;flex-direction:column;justify-content:center}
.pill{display:inline-block;padding:2px 9px;border-radius:8px;font-size:.7rem;font-weight:800;margin-bottom:10px}
.pill.MED{background:rgba(157,143,255,.18);color:var(--MED)}.pill.PED{background:rgba(45,212,168,.18);color:var(--PED)}
.pill.CIR{background:rgba(255,93,143,.18);color:var(--CIR)}.pill.GIN{background:rgba(255,148,89,.18);color:var(--GIN)}
.pill.SP{background:rgba(255,204,77,.18);color:var(--SP)}.pill.CB{background:rgba(56,189,248,.18);color:var(--CB)}
.front{font-size:1.08rem;line-height:1.5}
.opts{display:flex;flex-direction:column;gap:8px;margin-top:14px}
.opt{background:var(--panel2);border:1px solid #2a3550;border-radius:10px;padding:12px 15px;cursor:pointer;font-size:.95rem;text-align:left;color:var(--ink);font-family:inherit;display:block;width:100%}
.opt:hover{border-color:var(--accent)}
.opt.correct{border-color:var(--green);background:rgba(45,212,168,.16);color:#eafff8}
.opt.wrong{border-color:var(--red);background:rgba(255,93,143,.16);color:#ffeef4}
.opt.disabled{cursor:default;opacity:.92}
.back{margin-top:14px;padding-top:14px;border-top:1px dashed #2a3550;font-size:.95rem;color:#d2dcef}
.explain{margin-top:12px;font-size:.95rem;line-height:1.6;color:var(--ink);background:rgba(157,143,255,.08);border:1px solid rgba(157,143,255,.25);border-radius:10px;padding:14px 16px}
.explain b{color:var(--accent)}
.explain .correcta{color:var(--green);font-weight:800;display:block;margin-bottom:6px}
.explain .incorrecta{color:var(--red);font-weight:800;display:block;margin-bottom:6px}
.btnrow{display:flex;gap:8px;margin-top:18px;flex-wrap:wrap}
.btn{flex:1;min-width:90px;border:none;border-radius:10px;padding:10px;font-weight:800;font-size:.82rem;cursor:pointer;color:#06121a}
.b0{background:var(--red)}.b1{background:var(--gold)}.b2{background:var(--accent)}.b3{background:var(--green)}
.bigbtn{background:linear-gradient(90deg,var(--accent),var(--green));border:none;border-radius:12px;padding:14px;font-weight:900;color:#06121a;cursor:pointer;font-size:1rem;width:100%}
.confrow{display:flex;gap:8px;margin-top:16px}
.confbtn{flex:1;padding:10px;border-radius:10px;border:1px solid #2a3550;background:var(--panel2);color:var(--ink);cursor:pointer;font-size:.82rem}
.confbtn:hover{border-color:var(--accent)}
.stat{display:flex;gap:16px;flex-wrap:wrap;font-size:.82rem;color:var(--muted)}
.reveal{display:none}
.centermsg{text-align:center;color:var(--muted);padding:40px 10px}
a.back-link{color:var(--accent);text-decoration:none;font-size:.85rem}

  /* === INTERACTIVIDAD MODERNA (glow + lift + transiciones suaves) === */
  a, button, .btn, .qcard, .card, .panel, .fija, .chip, .navitem, .pdflink, .realq, .expbtn, .openbtn, .opt, th, .qa, td, .cd, input[type="checkbox"]{
    transition:transform .18s cubic-bezier(.34,1.56,.64,1), box-shadow .22s ease, border-color .18s ease, background .18s ease, filter .18s ease;
  }
  .btn, button.btn, .openbtn{ box-shadow:0 2px 10px rgba(157,143,255,.0); }
  .btn:hover, button.btn:hover, .openbtn:hover{ transform:translateY(-2px); box-shadow:0 6px 20px rgba(157,143,255,.35); filter:brightness(1.08); }
  .btn:active, button.btn:active, .openbtn:active{ transform:translateY(0) scale(.96); box-shadow:0 2px 8px rgba(157,143,255,.25); }
  .qcard:hover{ box-shadow:0 10px 28px rgba(157,143,255,.22), 0 0 0 1px rgba(157,143,255,.25); }
  .card:hover, .panel:hover, .fija:hover{ border-color:rgba(157,143,255,.35); box-shadow:0 8px 24px rgba(0,0,0,.28); }
  .chip:hover{ transform:translateY(-1px); border-color:var(--accent); }
  .chip.on{ box-shadow:0 0 0 1px rgba(157,143,255,.3), 0 4px 12px rgba(157,143,255,.18); }
  .navitem:hover{ transform:translateX(3px); }
  .navitem.active{ box-shadow:inset 3px 0 0 var(--accent); }
  .opt:hover{ transform:translateX(2px); box-shadow:0 3px 12px rgba(157,143,255,.15); }
  .realq:hover, .qa:hover{ border-left-width:4px; }
  .pdflink:hover{ transform:translateY(-2px); box-shadow:0 8px 20px rgba(255,93,143,.2); }
  ::selection{ background:rgba(157,143,255,.35); color:#fff; }
  input[type="checkbox"]{ accent-color:var(--accent); }
  html{ scroll-behavior:smooth; }
</style>
</head>
<body>
<div class="wrap">
<a class="back-link" href="index.html">← volver al portal</a>
<h1>🎯 Repaso Inteligente</h1>
<div class="sub">Repetición espaciada (SM-2) + preguntas intercaladas de todas las áreas. Prioriza lo que se te olvida.</div>
<div class="top">
  <div class="stat" id="statTop">Cargando...</div>
  <div id="gamiWidget"></div>
</div>
<div id="stage"></div>
</div>

<script src="datos_banco.js"></script>
<script src="datos_flashcards.js"></script>
<script src="examenes_data.js"></script>
<script src="datos_examenes/2022.js"></script>
<script src="datos_examenes/2024.js"></script>
<script src="datos_examenes/2025.js"></script>
<script>window.EXAMENES=(window.EXAMENES||[]).concat(typeof EXAMENES_2022!=='undefined'?EXAMENES_2022:[],typeof EXAMENES_2024!=='undefined'?EXAMENES_2024:[],typeof EXAMENES_2025!=='undefined'?EXAMENES_2025:[]);</script>
<script src="motor_srs.js"></script>
<script src="motor_gamificacion.js"></script>
<script>
const ANAMES={MED:"Medicina",PED:"Pediatría",CIR:"Cirugía",GIN:"Gineco-Obst.",SP:"Salud Pública",CB:"C. Básicas"};

// ---- Construir pool unificado ----
let pool=[];
(typeof CARDS!=='undefined'?CARDS:[]).forEach((c,i)=>{
  const [a,tema]=(c.t||"· ").split(" · ");
  pool.push({id:"fc"+i, kind:"fc", area:(a||"MED").trim(), tema:tema||"", front:c.f, back:c.b});
});
(typeof BANK!=='undefined'?BANK:[]).forEach((q,i)=>{
  pool.push({id:"bk"+i, kind:"mcq", area:q.area, tema:q.tema||"", q:q.q, o:q.o, c:q.c, e:q.e});
});
(window.EXAMENES||[]).forEach((q,i)=>{
  pool.push({id:"ex"+(q.ex||"")+"_"+(q.n||i), kind:"mcq", area:q.area, tema:q.tema||"", q:q.q, o:q.o, c:q.c, e:q.e, src:q.ex});
});

const EXAMEN=new Date(2026,8,6);
const diasAlExamen=Math.max(0,Math.ceil((EXAMEN-new Date())/86400000));

let cola=[], idx=0, sesXP=0, sesN=0;
const stage=document.getElementById("stage");

function refreshTop(){
  const c=SRS.contarVencidosYNuevos(pool);
  document.getElementById("statTop").innerHTML=
    `<span>📌 ${c.vencidos} para repasar</span><span>🆕 ${c.nuevos} nuevas</span><span>✅ ${c.dominadas} dominadas</span><span>📅 ${diasAlExamen} días al examen</span>`;
  document.getElementById("gamiWidget").innerHTML=GAMI.widgetHTML();
}
refreshTop();

function iniciar(){
  cola=SRS.construirCola(pool,{diasAlExamen, maxItems:30});
  idx=0; sesXP=0; sesN=0;
  if(cola.length===0){
    stage.innerHTML='<div class="centermsg">🎉 No tienes nada pendiente ahora mismo. Vuelve más tarde o repasa igual desde Flashcards/Banco.</div>';
    return;
  }
  mostrar();
}

function mostrar(){
  if(idx>=cola.length){ return terminar(); }
  const it=cola[idx];
  if(it.kind==="fc") renderFC(it); else renderMCQ(it);
}

function renderFC(it){
  stage.innerHTML=`<div class="card">
    <span class="pill ${it.area}">${ANAMES[it.area]||it.area}${it.tema?" · "+it.tema:""}</span>
    <div class="front">${it.front}</div>
    <div class="back reveal" id="back"><b>Respuesta:</b> ${it.back}</div>
    <button class="bigbtn" id="flip">Voltear 🔄</button>
    <div class="btnrow reveal" id="grades">
      <button class="btn b0" onclick="calificar(0)">Otra vez</button>
      <button class="btn b1" onclick="calificar(1)">Difícil</button>
      <button class="btn b2" onclick="calificar(2)">Bien</button>
      <button class="btn b3" onclick="calificar(3)">Fácil</button>
    </div>
  </div>`;
  document.getElementById("flip").onclick=()=>{
    document.getElementById("back").style.display="block";
    document.getElementById("grades").style.display="flex";
    document.getElementById("flip").style.display="none";
  };
}

let confActual=null;
function renderMCQ(it){
  stage.innerHTML=`<div class="card">
    <span class="pill ${it.area}">${ANAMES[it.area]||it.area}${it.tema?" · "+it.tema:""}</span>
    <div class="front">${it.q}</div>
    <div id="confArea">
      <div style="font-size:.8rem;color:var(--muted);margin-top:10px">¿Qué tan seguro estás antes de ver las opciones?</div>
      <div class="confrow">
        <button class="confbtn" onclick="elegirConfianza(0)">🤔 Adivinando</button>
        <button class="confbtn" onclick="elegirConfianza(1)">🙂 Algo seguro</button>
        <button class="confbtn" onclick="elegirConfianza(2)">💪 Muy seguro</button>
      </div>
    </div>
    <div class="opts reveal" id="opts"></div>
    <div class="explain reveal" id="expl"></div>
    <button class="bigbtn reveal" id="btnSiguiente" style="margin-top:14px;display:none" onclick="avanzar()">Siguiente pregunta →</button>
  </div>`;
}

function elegirConfianza(n){
  confActual=n;
  const it=cola[idx];
  document.getElementById("confArea").style.display="none";
  const optsEl=document.getElementById("opts");
  optsEl.style.display="flex";
  optsEl.innerHTML=it.o.map((op,i)=>`<button class="opt" data-i="${i}" onclick="responder(${i})">${String.fromCharCode(65+i)}. ${op}</button>`).join("");
}

let gradoPendiente=null;
const L6=["A","B","C","D","E","F"];
function responder(i){
  const it=cola[idx];
  const botones=[...document.querySelectorAll("#opts .opt")];
  botones.forEach(b=>{ b.onclick=null; b.classList.add("disabled"); });
  botones[it.c].classList.add("correct");
  const acerto = i===it.c;
  if(!acerto) botones[i].classList.add("wrong");
  const explEl=document.getElementById("expl");
  explEl.style.display="block";
  const encabezado = acerto
    ? `<span class="correcta">✅ ¡Correcto! Respuesta: ${L6[it.c]}. ${it.o[it.c]}</span>`
    : `<span class="incorrecta">❌ Incorrecto — tú elegiste ${L6[i]}. La respuesta correcta es ${L6[it.c]}. ${it.o[it.c]}</span>`;
  explEl.innerHTML = encabezado + `<b>Por qué:</b> ${it.e||"(esta pregunta no tiene explicación registrada todavía)"}`;
  SRS.registrarConfianza(confActual, acerto);
  // deriva la calificación SM-2 de la confianza + acierto (menos fricción que pedir 2 pasos)
  let g;
  if(!acerto) g=0;
  else g = confActual===2?3 : confActual===1?2 : 1;
  gradoPendiente=g;
  const btn=document.getElementById("btnSiguiente");
  btn.style.display="block";
  btn.textContent = idx>=cola.length-1 ? "Terminar sesión 🏁" : "Siguiente pregunta →";
}

function avanzar(){
  if(gradoPendiente===null) return;
  calificar(gradoPendiente);
  gradoPendiente=null;
}

function calificar(g){
  const it=cola[idx];
  SRS.grade(it.id, g);
  const xp = 6 + g*3; // más XP por dominar bien, no por adivinar
  GAMI.sumarXP(xp);
  sesXP+=xp; sesN++;
  idx++;
  refreshTop();
  mostrar();
}

function terminar(){
  const cal=SRS.calibracion();
  const calHtml=cal.filter(c=>c.n>0).map(c=>`<div>${c.nivel}: acertaste ${c.pct}% (${c.n} veces)</div>`).join("");
  stage.innerHTML=`<div class="card" style="text-align:center">
    <div style="font-size:2rem">🏁</div>
    <div style="font-weight:800;font-size:1.1rem;margin:8px 0">Sesión terminada</div>
    <div style="color:var(--muted);margin-bottom:10px">${sesN} ítems repasados · +${sesXP} XP</div>
    <div style="font-size:.82rem;color:var(--muted);text-align:left;max-width:320px;margin:0 auto">
      <b style="color:var(--ink)">Tu calibración (¿sabes cuándo sabes?):</b><br>${calHtml||"Aún no hay datos suficientes."}
    </div>
    <button class="bigbtn" style="margin-top:16px" onclick="iniciar()">Otra ronda ↻</button>
  </div>`;
  refreshTop();
}

iniciar();
</script>
</body>
</html>
